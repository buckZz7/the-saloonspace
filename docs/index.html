<title>SaloonSpace</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#151210" id="theme-color-meta">
<script>
// Set theme-color immediately based on stored preference, before CSS loads
(function(){
  var t=localStorage.getItem('saloon-theme');
  if(!t)t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';
  var meta=document.getElementById('theme-color-meta');
  if(meta)meta.content=t==='dark'?'#151210':'#d4c4a8';
  document.documentElement.setAttribute('data-theme',t);
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
