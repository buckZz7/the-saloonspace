function renderMessages(){
  if(state.loadingMessages)return '<div style="color:var(--text-tertiary);text-align:center;padding:40px"><div style="display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:8px"></div><div>Loading messages…</div></div>';
  if(!state.messages.length)return '<div style="color:var(--text-tertiary);text-align:center;padding:40px">No messages yet. Say howdy.</div>';
  // Search filtering
  const searchQ=(state.channelSearchQuery||'').toLowerCase();
  let msgs=state.messages;
  if(searchQ){
    msgs=state.messages.filter(m=>m.content.toLowerCase().includes(searchQ));
    if(msgs.length===0)return '<div class="search-no-results">No results found for "'+escapeHtml(state.channelSearchQuery)+'"</div>';
  }
  const now=Date.now();
  return msgs.map((m,i)=>{
    const isOwn=m.author===state.user.pk;
    const name=isOwn?(state.user.name||'You'):(state.profiles[m.author]?.name||m.author.slice(0,8)+'…');
    const pic=state.profiles[m.author]?.picture;
    const isAgent=state.profiles[m.author]?.isAgent;
    // Message grouping: same author within 5 min
    const prev=msgs[i-1];
    const grouped=prev&&prev.author===m.author&&(m.time-prev.time)<300000&&!m.edited;
    // Check presence: real NIP-38 status or fallback to recent message heuristic
    const isOnline=state.presence?.[m.author] || (now-m.time.getTime())<120000;
    const avatar=pic?`<div class="avatar" style="position:relative"><img src="${escapeHtml(pic)}" onerror="this.style.display='none';this.parentElement.textContent='${escapeHtml(name[0]?.toUpperCase()||'?')}'">${isOnline&&!grouped?'<span class="presence-dot"></span>':''}</div>`:`<div class="avatar" style="background:${avatarBg(m.author)};color:#fff;border:none;position:relative">${escapeHtml(name[0]?.toUpperCase()||'?')}${isOnline&&!grouped?'<span class="presence-dot"></span>':''}</div>`;
    // Reactions
    const reacts=(state.reactions[m.id]||[]);
    const emojiCounts={};
    reacts.forEach(r=>{emojiCounts[r.emoji]=(emojiCounts[r.emoji]||[]);emojiCounts[r.emoji].push(r.author)});
    const reactionsHtml=Object.keys(emojiCounts).length>0?`<div class="reactions">${Object.entries(emojiCounts).map(([emoji,authors])=>{
      const mine=authors.includes(state.user.pk);
      return `<span class="reaction-pill ${mine?'mine':''}" onclick="toggleReaction('${m.id}','${emoji}')">${emoji}<span class="count">${authors.length}</span></span>`;
    }).join('')}</div>`:'';
    // Action menu — Reply for all, Edit/Delete for own messages
    const actionsHtml=`<div class="msg-actions"><button onclick="pinMessage('${m.id}')">Pin</button><button onclick="copyMessage('${m.id}')">Copy</button><button onclick="hideMessage('${m.id}')">Hide</button><button onclick="startReply('${m.id}')">Reply</button>${isOwn?`<button onclick="startEdit('${m.id}')">Edit</button><button onclick="deleteMessage('${m.id}')">Delete</button>`:''}</div>`;
    // Reaction bar (for all messages)
    const reactionBar=`<div class="reaction-bar"><button onclick="toggleReaction('${m.id}','👍')">👍</button><button onclick="toggleReaction('${m.id}','❤️')">❤️</button><button onclick="toggleReaction('${m.id}','😂')">😂</button><button onclick="toggleReaction('${m.id}','🤠')">🤠</button></div>`;
    // Reply quote — if this message is a reply, look up the original
    let replyQuoteHtml='';
    if(m.replyTo){
      const origMsg=state.messages.find(x=>x.id===m.replyTo);
      if(origMsg){
        const origName=origMsg.author===state.user.pk?(state.user.name||'You'):(state.profiles[origMsg.author]?.name||origMsg.author.slice(0,8)+'…');
        const origText=escapeHtml(origMsg.content.slice(0,80));
        replyQuoteHtml=`<div class="reply-quote" onclick="scrollToMessage('${origMsg.id}')"><span class="reply-author">${escapeHtml(origName)}</span> <span class="reply-text">${origText}</span></div>`;
      } else {
        replyQuoteHtml=`<div class="reply-quote"><span class="reply-author">Reply</span> <span class="reply-text">Original message not available</span></div>`;
      }
    }
    return `
    <div class="msg ${grouped?'grouped':''}" data-msg-id="${m.id}">
      ${avatar}
      <div class="body">
        ${reactionBar}
        ${actionsHtml}
        ${replyQuoteHtml}

  }).join('');
}

function renderMentionPopup(){
  const q=state.mentionQuery;
  const allPks=new Set();
  // From profiles cache
  Object.keys(state.profiles).forEach(pk=>allPks.add(pk));
  // From DM contacts
  const dms=JSON.parse(localStorage.getItem('saloon-dms')||'[]');
  dms.forEach(d=>allPks.add(d.pubkey));
  // Add own
  allPks.add(state.user.pk);
  const filtered=[...allPks].filter(pk=>{
    if(pk===state.user.pk)return false;
    const name=state.profiles[pk]?.name||pk.slice(0,8);
    return name.toLowerCase().includes(q.toLowerCase());
  }).slice(0,8);
  if(filtered.length===0)return'';
  return `<div class="mention-popup" id="mentionPopup">${filtered.map(pk=>{
    const name=state.profiles[pk]?.name||pk.slice(0,8)+'…';
    const pic=state.profiles[pk]?.picture;
    return `<div class="item" onclick="insertMention('${pk}')">${pic?`<img src="${escapeHtml(pic)}" style="width:24px;height:24px;border-radius:50%;object-fit:cover">`:`<div class="avatar-sm">${escapeHtml(name[0]?.toUpperCase()||'?')}</div>`}<span>${escapeHtml(name)}</span></div>`;
  }).join('')}</div>`;
}

async function checkAllRelays(){
  const relays=getRelays();
  // Reset status to checking
  for(const url of relays){window.relayStatusMap[url]='checking'}
  // Update pills to show checking state
  for(let i=0;i<relays.length;i++){
    const pill=document.getElementById('relay-pill-'+i);
    if(pill){pill.className='relay-pill relay-pill-checking';pill.textContent='…'}
  }
  // Test each relay independently
  for(let i=0;i<relays.length;i++){
    const url=relays[i];
    testRelay(url,i);
  }
}
async function testRelay(url,index){
  try{
    const testPool=new SimplePool();
    const timeoutPromise=new Promise((_,reject)=>setTimeout(()=>reject(new Error('timeout')),5000));
    const result=await Promise.race([
      testPool.list([url],[{kinds:[1],limit:1}]),
      timeoutPromise
    ]);
    window.relayStatusMap[url]='online';
    const pill=document.getElementById('relay-pill-'+index);
    if(pill){pill.className='relay-pill relay-pill-online';pill.textContent='Online'}
    try{testPool.close&&(typeof testPool.close==='function')&&testPool.close()}catch(e){}
  }catch(e){
    window.relayStatusMap[url]='error';
    const pill=document.getElementById('relay-pill-'+index);
    if(pill){pill.className='relay-pill relay-pill-error';pill.textContent='Error'}
  }
}

function formatTime(date,prevDate){
  const now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const yesterday=new Date(today.getTime()-86400000);
  const msgDay=new Date(date.getFullYear(),date.getMonth(),date.getDate());
  const time=date.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  // Check if previous message was same day
  const sameDayAsPrev=prevDate&&new Date(prevDate.getFullYear(),prevDate.getMonth(),prevDate.getDate()).getTime()===msgDay.getTime();
  if(sameDayAsPrev)return time; // just time for subsequent messages same day
  if(msgDay.getTime()===today.getTime())return 'Today at '+time;
  if(msgDay.getTime()===yesterday.getTime())return 'Yesterday at '+time;
  return date.toLocaleDateString([],{month:'short',day:'numeric'})+' at '+time;
}

async function handleAvatarUpload(file, inputId) {
  if(!file) return;
  if(file.size > 2*1024*1024) { showToast('Image too large (max 2MB)'); return; }
  // Resize image to max 256x256 to keep the data URI small
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const max = 256;
      let {width, height} = img;
      if(width > height) { if(width > max) { height = height * max / width; width = max; } }
      else { if(height > max) { width = width * max / height; height = max; } }
      canvas.width = width;
      canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      const dataUri = canvas.toDataURL('image/jpeg', 0.85);
      const input = document.getElementById(inputId);
      if(input) { input.value = dataUri; showToast('Avatar set'); }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
async function handleFileUpload(file) {
  if(!file) return;
  if(file.size > 5*1024*1024) { showToast('Image too large (max 5MB)'); return; }
  // Convert to base64 data URI for now (no external upload server)
  // In production this would upload to a NIP-96/NIP-94 file storage relay
  const reader = new FileReader();
  reader.onload = async (e) => {
    const dataUri = e.target.result;
    // Send as message with image URL
    const msg = `![image](${dataUri})`;
    if(state.activeChannel) {
      await sendMessage(state.activeChannel, msg);
    }
    // Reset file input
    document.getElementById('fileInput').value = '';
  };
  reader.readAsDataURL(file);
}

function confirmLeaveSaloon(groupId,action){
  const btn=event.target;
  const step=btn.dataset.confirmStep||'0';
  const g=state.groups.find(x=>x.id===groupId);
  const saloonName=g?g.name:'this saloon';
  const defaultText=action==='delete'?'Delete saloon':'Leave saloon';
  // Clear any existing reset timer
  if(btn._confirmTimer){clearTimeout(btn._confirmTimer);btn._confirmTimer=null}
  if(step==='0'){
    btn.dataset.confirmStep='1';
    btn.textContent='Click again to confirm';
    btn.style.background='var(--danger)';
    btn.style.color='#fff';
    btn._confirmTimer=setTimeout(()=>{btn.dataset.confirmStep='0';btn.textContent=defaultText;btn.style.background='';btn.style.color='var(--danger)'},3000);
    return;
  }
  if(step==='1'){
    btn.dataset.confirmStep='2';
    btn.textContent=action==='delete'?`Are you sure? Click to DELETE ${saloonName}`:`Are you sure? Click to LEAVE ${saloonName}`;
    btn.style.background='var(--danger)';
    btn.style.color='#fff';
    btn._confirmTimer=setTimeout(()=>{btn.dataset.confirmStep='0';btn.textContent=defaultText;btn.style.background='';btn.style.color='var(--danger)'},3000);
    return;
  }
  if(step==='2'){
    btn.dataset.confirmStep='0';
    leaveSaloon(groupId);
    return;
  }
}

function highlightSearch(html,query){
  if(!query)return html;
  try{
    const escaped=query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const regex=new RegExp('('+escaped+')','gi');
    // Only highlight in text nodes, not inside HTML tags
    return html.replace(/>([^<]+)</g,(match,text)=>{
      return '>'+text.replace(regex,'<span class="search-highlight">$1</span>')+'<';
    });
  }catch(e){return html}
}

  }

async function fetchMessageProfiles(){
  const authors=new Set(state.messages.map(m=>m.author));
  const unknown=[];
  for(const pk of authors){
    if(!state.profiles[pk]){
      if(pk===state.user.pk){state.profiles[pk]={name:state.user.name,about:state.user.about,picture:state.user.picture,link:state.user.link,isAgent:state.user.isAgent};continue}
      unknown.push(pk);
    }
  }
  if(unknown.length===0)return;
  await initPool();
  // Batch all unknown pubkeys into a single pool.list() query
  // nostr-tools supports multiple authors in a single filter
  const events=await pool.list(getRelays(),[{kinds:[0],authors:unknown,limit:unknown.length}]);
  const fetched=new Set();
  for(const e of events){
    try{
      const prof=JSON.parse(e.content);
      if(!state.profiles[e.pubkey]||Object.keys(state.profiles[e.pubkey]||{}).length===0){
        state.profiles[e.pubkey]=prof;
      }
      fetched.add(e.pubkey);
    }catch{}
  }
  // Fill empty profiles for pubkeys that returned nothing
  for(const pk of unknown){
    if(!fetched.has(pk)&&!state.profiles[pk])state.profiles[pk]={};
  }
}

// --- NIP-38 User Status (kind 30315) ---
async function broadcastPresence() {
  if(!state.user?.sk) return;
  await initPool();
  const event = finishEvent({
    kind: 30315,
    content: JSON.stringify({status: 'online'}),
    tags: [['d', 'general']],
    created_at: Math.floor(Date.now()/1000)
  }, state.user.sk);
  try { await Promise.any(pool.publish(getRelays(), event)); } catch(e){}
}
async function fetchPresence(pubkeys) {
  await initPool();
  const events = await pool.list(getRelays(), [{kinds:[30315], authors: pubkeys, limit: pubkeys.length}]);
  const presence = {};
  const now = Math.floor(Date.now()/1000);
  events.forEach(e => {
    // Online if status published in last 3 minutes
    if(now - e.created_at < 180) {
      presence[e.pubkey] = true;
    }
  });
  return presence;
}

async function init(){
  // Back button closes modals/sidebar before navigating away
  // Mobile swipe-to-close sidebar
  let touchStartX=0,touchEndX=0;
  document.addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].screenX});
  document.addEventListener('touchend',e=>{
    touchEndX=e.changedTouches[0].screenX;
    if(touchStartX-touchEndX>80&&state.sidebarOpen&&window.innerWidth<768){
      state.sidebarOpen=false;render();
    }
  });
  window.addEventListener('popstate',()=>{
    if(state.showProfile||state.viewingProfile||state.showCreateGroupModal||state.showCreateChannelModal||state.showNewDMModal||state.showSettingsModal){
      state.showCreateGroupModal=false;state.showCreateChannelModal=false;state.showNewDMModal=false;state.showMembersPanel=false;state.replyingTo=null;state.replyingToContent=null;
      if(state.view==='settings'||state.view==='profile'||state.view==='saloonSettings'||state.view==='relays')goBack();
      render();
      history.pushState(null,'',location.href);
    } else if(state.sidebarOpen){
      state.sidebarOpen=false;render();
      history.pushState(null,'',location.href);
    }
  });
  // Check for invite hash
  const joinHash=location.hash.match(/join=([^&]+)/);
  if(joinHash){
    state.pendingJoinId=decodeURIComponent(joinHash[1]);
    history.replaceState(null,'',location.pathname);
  }
  if(loadUser()){
    render(); // show app instantly, empty groups
    loadGroups(); // fetch in background, will re-render when done
    // NIP-38: broadcast presence every 2 minutes
    broadcastPresence();
    setInterval(broadcastPresence, 120000);
    // Broadcast offline on page close
    window.addEventListener('beforeunload', () => {
      const event = finishEvent({kind:30315, content:'{"status":"offline"}', tags:[['d','general']], created_at:Math.floor(Date.now()/1000)}, state.user.sk);
      Promise.any(pool.publish(getRelays(), event)).catch(()=>{});
    });
    // Auto-join if pending
    if(state.pendingJoinId){
      setTimeout(()=>{
        if(!state.groups.find(g=>g.id===state.pendingJoinId)){
          submitJoinGroupById(state.pendingJoinId);
        }
        state.pendingJoinId=null;
      },3000);
    }
  } else {
    render();
  }
  // Keyboard shortcuts
  document.addEventListener('keydown',(e)=>{
    // Escape closes modals/panels (works even inside inputs)
    if(e.key==='Escape'){
      closeAllModals();
      return;
    }
    // Ctrl+K toggles channel search — don't interfere with typing in inputs
    if((e.ctrlKey||e.metaKey)&&e.key==='k'){
      const tag=(e.target?.tagName||'').toLowerCase();
      if(tag==='input'||tag==='textarea')return;
      e.preventDefault();
      if(state.activeChannel){
        toggleChannelSearch();
      }
    }
  });
}
